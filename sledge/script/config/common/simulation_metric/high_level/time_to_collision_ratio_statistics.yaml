time_to_collision_ratio_statistics:
  _target_: nuplan.planning.metrics.evaluation_metrics.common.time_to_collision_ratio.TimeToCollisionRatioStatistics
  _convert_: 'all'
  name: 'time_to_collision_ratio'
  category: 'Planning'
  metric_score_unit: 'float'

  time_step_size: 0.1
  time_horizon: 3.0
  least_min_ttc: 0.95

  required_metrics:
    # Parameter: base metric name and other high level metrics used in this metric
    ego_lane_change_metric: ego_lane_change_statistics
    no_ego_at_fault_collisions_metric: no_ego_at_fault_collisions_statistics 