minimum_comfortable_interaction_distance_statistics:
  _target_: nuplan.planning.metrics.evaluation_metrics.common.minimum_comfortable_interaction_distance_metric.MinimumComfortableInteractionDistanceStatistics
  _convert_: 'all'
  name: 'minimum_comfortable_interaction_distance_statistics'
  category: 'Planning'
  metric_score_unit: 'ratio'

  time_step_size: 0.1
  time_horizon: 10.0
  comfort_distance_m: 2.0
  comfort_ttc_s: 2.0
  least_min_ttc: 0.0

  required_metrics:
    ego_lane_change_metric: ego_lane_change_statistics
    no_ego_at_fault_collisions_metric: no_ego_at_fault_collisions_statistics 